<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | Help Ticket Register</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep:    #0a0d14;
    --bg-card:    #111622;
    --border:     #1e2d45;
    --accent-blue:   #4da6ff;
    --text-primary:  #f0f4ff;
    --text-muted:    #8899bb;
    --font-display: 'Rajdhani', sans-serif;
    --font-mono:    'Share Tech Mono', monospace;
    --font-body:    'Inter', sans-serif;
    --radius: 6px;
  }
  html, body {
    background: var(--bg-deep); color: var(--text-primary);
    font-family: var(--font-body); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
    pointer-events: none; z-index: 0;
  }
  .login-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 40px; width: 100%; max-width: 400px;
    position: relative; z-index: 1; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .header-icon {
    width: 44px; height: 44px; background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: var(--radius); display: grid; place-items: center; font-size: 20px;
    margin: 0 auto 16px;
  }
  h1 {
    font-family: var(--font-display); font-size: 24px; text-align: center;
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 30px;
  }
  h1 span { color: var(--accent-blue); }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px;
  }
  .form-group input {
    width: 100%; background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; color: var(--text-primary);
    font-size: 14px; font-family: var(--font-body); outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: var(--accent-blue); }
  .btn-submit {
    width: 100%; background: linear-gradient(135deg, #1a3a5c, #0f2540);
    border: 1px solid var(--accent-blue); color: var(--accent-blue);
    padding: 12px; border-radius: var(--radius); cursor: pointer;
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; transition: all .2s; margin-top: 10px;
  }
  .btn-submit:hover { box-shadow: 0 0 16px rgba(77,166,255,.3); }
  #errorMessage {
    color: #e74c3c; font-size: 13px; text-align: center; margin-top: 16px;
    font-family: var(--font-mono); min-height: 20px;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="header-icon">🔐</div>
  <h1>System <span>Access</span></h1>
  
  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="admin@makedigitalindia.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••" />
    </div>
    <button type="submit" class="btn-submit" id="loginBtn">Authenticate</button>
    <div id="errorMessage"></div>
  </form>
</div>

<!-- FIREBASE AUTHENTICATION SCRIPT -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // ⚠️ PASTE YOUR FIREBASE CONFIGURATION HERE
  const firebaseConfig = {
    apiKey: "AIzaSyDW7DNpDVKEAwvUjYe9OoCaPGNQ2DMF_A8",
    authDomain: "makeidpasss.firebaseapp.com",
    projectId: "makeidpasss",
    storageBucket: "makeidpasss.firebasestorage.app",
    messagingSenderId: "609240883672",
    appId: "1:609240883672:web:c4eb3a49baf89850acd2ad"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMessage');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    loginBtn.textContent = "Verifying...";
    loginBtn.disabled = true;
    errorMsg.textContent = "";

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // Success! Save UID to session storage
        sessionStorage.setItem("userUID", userCredential.user.uid);
        // Redirect to your main app page
        window.location.href = "dashboard.html"; 
      })
      .catch((error) => {
        loginBtn.textContent = "Authenticate";
        loginBtn.disabled = false;
        errorMsg.textContent = "Invalid credentials. Please try again.";
        console.error(error.code, error.message);
      });
  });
</script>

</body>
</html>
